services:
  plast-mem-db:
    image: paradedb/paradedb:latest
    container_name: plast-mem-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=plastmem # TODO: from env
      - POSTGRES_PASSWORD=plastmem # TODO: from env
      - POSTGRES_DB=plastmem # TODO: from env
    ports:
      - '5433:5432'
    volumes:
      - plast-mem-db-data:/var/lib/postgresql

volumes:
  plast-mem-db-data:
